#cloud-config
# Minimal first-boot provisioning for the path A' dev VM. Keeps the guest just
# bootable + sshable; heavy lifting (verify /dev/kvm, install Firecracker deps)
# lives in scripts/setup.sh, run over ssh so it stays re-runnable and reviewable.
hostname: sleepwalk-dev
users:
  - name: sleepwalk
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - __PUBKEY__
ssh_pwauth: false
# No apt here. Under TCG (path A'), cloud-init's package_update +
# command-not-found index rebuild (`cnf-update-db`) pegs the emulated CPUs for
# 1000s+, causing RCU stalls / soft lockups and a boot that never converges.
# All package work moved to setup.sh, which disables the cnf apt hook first.
runcmd:
  # Neuter command-not-found's apt post-invoke hook so later apt runs are fast.
  - [ rm, -f, /etc/apt/apt.conf.d/50command-not-found ]
  # Touch a sentinel so `setup.sh` / callers can wait for cloud-init to finish.
  - [ touch, /var/lib/cloud/sleepwalk-ready ]
