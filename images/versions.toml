# sleepwalk — pinned artifact versions. THE source of truth for what runs.
# Every result file embeds this file's hash; nothing is "latest", everything is
# pinned + checksummed. `just fetch` downloads and verifies against the sha256
# fields below.
#
# Bootstrap: a sha256 left empty is treated as UNPINNED. `just fetch` will
# download it, print the observed hash, and refuse to call the artifact trusted
# until you paste that hash back here. Never hand-write a hash you didn't compute.
#
# Firecracker + kernel verified against primary sources 2026-06-11 (Unit 0.2):
#   - FC v1.16.0 is the latest stable (released 2026-06-04); aarch64 snapshot +
#     UFFD restore are production-ready per docs/snapshotting/snapshot-support.md
#     (GICv2 & GICv3; no cross-GIC-version restore — see ADR-004 CPU homogeneity).
#   - Guest kernel pinned from the FC CI bucket v1.15 series (v1.16 CI artifacts
#     not yet published one week post-release); 6.1.155 LTS for both arches.
# rootfs + dev_vm hashes remain unpinned until their units (0.4 / 0.3) build them.

[meta]
# arch is resolved at fetch time from the host; artifacts are stored arch-suffixed.
schema = "1"

[firecracker]
# https://github.com/firecracker-microvm/firecracker/releases
# sha256 = the published .tgz release-asset digest (GitHub API .assets[].digest).
version = "v1.16.0"
sha256_aarch64 = "531c713cdbc37d4b8bc2533d851aabc0267096afa1768086a37672abb668efd7"
sha256_x86_64  = "bd04e26952d4e158085778c6230a0b383d2619c319182e27eaa9d61a212e92d6"

[kernel]
# Firecracker CI guest kernel. Pinned to an exact build, not a moving "latest".
# Bucket: https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/<CI_VERSION>/<arch>/
# CI_VERSION = release version minus patch (v1.16.0 -> v1.16); FC's CI had not yet
# published the v1.16 tree on 2026-06-11, so we pin from the v1.15 series.
version = "6.1.155"
url_aarch64 = "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/aarch64/vmlinux-6.1.155"
url_x86_64  = "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/x86_64/vmlinux-6.1.155"
sha256_aarch64 = "e3544b10603acbf3db492cb52e000d22ba202cb4b63b9add027565683e11c591"
sha256_x86_64  = "e20e46d0c36c55c0d1014eb20576171b3f3d922260d9f792017aeff53af3d4f2"

[rootfs]
# Minimal busybox/alpine ext4 for the synthetic profile (built locally).
# Pinned by content hash once built; the build recipe is the source, this is the lock.
sha256_aarch64 = ""
sha256_x86_64  = ""

[ci_rootfs]
# Firecracker CI Ubuntu rootfs (squashfs) used by the KVM boot/lifecycle test
# — read-only, auto-login on ttyS0. Distinct from the synthetic [rootfs] above.
version = "ubuntu-24.04"
url_aarch64 = "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/aarch64/ubuntu-24.04.squashfs"
url_x86_64  = "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/x86_64/ubuntu-24.04.squashfs"
sha256_aarch64 = ""
sha256_x86_64  = "68321e0482baeb3844dafe8a6b08a6902401a7afc41fbfd8c3d9ea08aadd244f"

[dev_vm]
# Ubuntu cloud image for the M1/M2 TCG dev VM (path A'). Host-side only.
# Pinned to an exact dated build, not the moving `release/` symlink.
# https://cloud-images.ubuntu.com/releases/24.04/release-20260518/SHA256SUMS
# x86_64 has no dev VM — path C is native KVM, no nested guest needed.
ubuntu_release = "24.04"
ubuntu_img_aarch64 = "https://cloud-images.ubuntu.com/releases/24.04/release-20260518/ubuntu-24.04-server-cloudimg-arm64.img"
ubuntu_img_x86_64  = ""
sha256_aarch64 = "6a61b967ba4a27dd1966f835a67643073ed55c2860ce3dc1cb0517282e6b8bec"
sha256_x86_64  = ""

[toolchain]
rust = "1.95.0"           # mirrors rust-toolchain.toml
