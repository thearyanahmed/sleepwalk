# Observability stack for sleepwalk: Prometheus scrapes each hostd daemon's
# /metrics; Grafana renders them from a provisioned dashboard. Bring it up with
# `just observe`, then open Grafana at http://localhost:3000.
#
# Point it at your hostd daemons by editing prometheus/targets.json (each daemon
# must bind a reachable address, e.g. `hostd daemon 0.0.0.0:8080`).
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sleepwalk-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"
    # So a target of host.docker.internal:8080 reaches a hostd on this machine.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: sleepwalk-grafana
    environment:
      # Anonymous admin: this is a local, throwaway dashboards stack, not exposed.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
